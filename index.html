<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Baloony Search</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=DM+Sans:wght@300;400&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0d0d0f;
      --surface: #16161a;
      --border: #222226;
      --accent: #c8f547;
      --accent2: #7efff5;
      --text: #f0f0f0;
      --muted: #555;
    }

    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
    }

    body::before {
      content: '';
      position: fixed; inset: 0;
      background-image:
        linear-gradient(rgba(200,245,71,0.025) 1px, transparent 1px),
        linear-gradient(90deg, rgba(200,245,71,0.025) 1px, transparent 1px);
      background-size: 48px 48px;
      pointer-events: none; z-index: 0;
    }

    .blob {
      position: fixed;
      width: 700px; height: 700px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(200,245,71,0.07) 0%, transparent 68%);
      top: 50%; left: 50%;
      transform: translate(-50%, -55%);
      pointer-events: none; z-index: 0;
      animation: pulse 7s ease-in-out infinite;
    }

    @keyframes pulse {
      0%,100% { transform: translate(-50%,-55%) scale(1); opacity:.8; }
      50% { transform: translate(-50%,-55%) scale(1.1); opacity:1; }
    }

    .page {
      position: relative; z-index: 1;
      height: 100vh;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      padding: 20px;
    }

    .logo-wrap {
      text-align: center;
      margin-bottom: 40px;
      animation: fadeUp 0.6s ease both;
    }

    .logo {
      font-family: 'Syne', sans-serif;
      font-weight: 800;
      font-size: clamp(2.8rem, 8vw, 5rem);
      letter-spacing: -0.03em;
      line-height: 1;
    }

    .logo span { color: var(--accent); }

    .tagline {
      margin-top: 10px;
      font-size: 0.78rem;
      color: var(--muted);
      letter-spacing: 0.15em;
      text-transform: uppercase;
      font-weight: 300;
    }

    form {
      width: 100%; max-width: 620px;
      animation: fadeUp 0.6s 0.1s ease both;
    }

    .search-row {
      display: flex;
      border: 1px solid var(--border);
      border-radius: 14px;
      overflow: hidden;
      background: var(--surface);
      transition: border-color 0.2s, box-shadow 0.2s;
    }

    .search-row:focus-within {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(200,245,71,0.08);
    }

    .search-icon {
      display: flex; align-items: center;
      padding: 0 14px 0 18px;
      color: var(--muted);
    }

    .search-icon svg { width: 18px; height: 18px; }

    input[type="text"] {
      flex: 1;
      background: transparent;
      border: none; outline: none;
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      font-size: 1rem;
      padding: 15px 0;
      caret-color: var(--accent);
    }

    input[type="text"]::placeholder { color: var(--muted); }

    button[type="submit"] {
      background: var(--accent);
      border: none; cursor: pointer;
      padding: 0 24px;
      font-family: 'Syne', sans-serif;
      font-weight: 700;
      font-size: 0.82rem;
      letter-spacing: 0.06em;
      color: #0d0d0f;
      transition: background 0.2s;
      flex-shrink: 0;
    }

    button[type="submit"]:hover { background: #b8e03a; }

    footer {
      position: absolute; bottom: 28px;
      font-size: 0.72rem;
      color: var(--muted);
      letter-spacing: 0.06em;
      animation: fadeUp 0.6s 0.2s ease both;
    }

    footer a { color: var(--muted); text-decoration: none; transition: color 0.2s; }
    footer a:hover { color: var(--accent); }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(16px); }
      to { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
<body>
  <div class="blob"></div>
  <div class="page">
    <div class="logo-wrap">
      <div class="logo">baloony<span>.</span>search</div>
      <div class="tagline">the baloony web</div>
    </div>
    <form action="results.html" method="get">
      <div class="search-row">
        <div class="search-icon">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
          </svg>
        </div>
        <input type="text" name="q" placeholder="Search the Baloony web…" autocomplete="off" autofocus>
        <button type="submit">SEARCH</button>
      </div>
    </form>
    <footer>
      <a href="https://baloony.xyz">baloony.xyz</a> &nbsp;·&nbsp; powered by Google
    </footer>
  </div>
</body>
</html>
