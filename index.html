<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Baloony Search</title>

<script async src="https://cse.google.com/cse.js?cx=b0e5995eae2924f85"></script>

<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;600;700&display=swap" rel="stylesheet">

<style>

:root{
--accent:#c33a3a;
}

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
font-family:"Space Grotesk", sans-serif;
height:100vh;
display:flex;
flex-direction:column;
align-items:center;
justify-content:center;
color:white;
overflow:hidden;

/* animated gradient */
background: radial-gradient(circle at 30% 30%, #1a0b0b, #020408 60%);
animation: gradientMove 12s ease-in-out infinite alternate;
}

@keyframes gradientMove{
0%{background-position:0% 50%;}
100%{background-position:100% 50%;}
}

/* grid */

body::before{
content:"";
position:fixed;
inset:0;

background-image:
linear-gradient(rgba(255,255,255,0.05) 1px, transparent 1px),
linear-gradient(90deg, rgba(255,255,255,0.05) 1px, transparent 1px);

background-size:60px 60px;
opacity:.35;
pointer-events:none;
}

/* spotlight layer */

.spotlight{
position:fixed;
inset:0;
pointer-events:none;

background: radial-gradient(
600px circle at var(--x) var(--y),
rgba(255,80,80,0.15),
transparent 60%
);
}

/* title */

.title{
font-size:clamp(60px,8vw,120px);
font-weight:700;
letter-spacing:-2px;
margin-bottom:10px;
}

.title span{
color:var(--accent);
}

/* subtitle */

.subtitle{
opacity:.5;
letter-spacing:4px;
font-size:14px;
margin-bottom:60px;
}

/* search */

.search-box{
width:min(900px,80vw);
}

/* footer */

.footer{
margin-top:60px;
opacity:.35;
font-size:14px;
}

</style>
</head>

<body>

<div class="spotlight"></div>

<div class="title">
baloony<span>.</span>search
</div>

<div class="subtitle">
THE BALOONY WEB
</div>

<div class="search-box">
<div class="gcse-search"></div>
</div>

<div class="footer">
baloony.xyz · powered by Google
</div>

<script>

const spotlight = document.querySelector(".spotlight");

document.addEventListener("mousemove", e => {

spotlight.style.setProperty("--x", e.clientX + "px");
spotlight.style.setProperty("--y", e.clientY + "px");

});

</script>

</body>
</html>
