<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Baloony Search</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=DM+Sans:wght@300;400&display=swap" rel="stylesheet">
  <script async src="https://cse.google.com/cse.js?cx=b0e5995eae2924f85"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0d0d0f;
      --surface: #16161a;
      --border: #222226;
      --accent: #c8f547;
      --accent2: #7efff5;
      --text: #f0f0f0;
      --muted: #555;
      --muted2: #888;
    }

    html, body {
      min-height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
    }

    body::before {
      content: '';
      position: fixed; inset: 0;
      background-image:
        linear-gradient(rgba(200,245,71,0.02) 1px, transparent 1px),
        linear-gradient(90deg, rgba(200,245,71,0.02) 1px, transparent 1px);
      background-size: 48px 48px;
      pointer-events: none; z-index: 0;
    }

    .page {
      position: relative; z-index: 1;
      max-width: 720px;
      margin: 0 auto;
      padding: 32px 20px 80px;
    }

    /* ── HEADER ── */
    .header {
      display: flex;
      align-items: center;
      gap: 24px;
      margin-bottom: 28px;
      flex-wrap: wrap;
    }

    .logo {
      font-family: 'Syne', sans-serif;
      font-weight: 800;
      font-size: 1.6rem;
      letter-spacing: -0.03em;
      text-decoration: none;
      color: var(--text);
      flex-shrink: 0;
    }

    .logo span { color: var(--accent); }

    /* ── SEARCH BAR (inline on results page) ── */
    .search-wrap {
      flex: 1;
      min-width: 240px;
    }

    .search-row {
      display: flex;
      border: 1px solid var(--border);
      border-radius: 10px;
      overflow: hidden;
      background: var(--surface);
      transition: border-color 0.2s, box-shadow 0.2s;
    }

    .search-row:focus-within {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(200,245,71,0.08);
    }

    .search-icon {
      display: flex; align-items: center;
      padding: 0 12px 0 14px;
      color: var(--muted);
    }

    .search-icon svg { width: 16px; height: 16px; }

    #q {
      flex: 1;
      background: transparent;
      border: none; outline: none;
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      font-size: 0.95rem;
      padding: 11px 0;
      caret-color: var(--accent);
    }

    #q::placeholder { color: var(--muted); }

    .search-btn {
      background: var(--accent);
      border: none; cursor: pointer;
      padding: 0 18px;
      font-family: 'Syne', sans-serif;
      font-weight: 700;
      font-size: 0.78rem;
      letter-spacing: 0.06em;
      color: #0d0d0f;
      transition: background 0.2s;
    }

    .search-btn:hover { background: #b8e03a; }

    /* ── CSE CONTAINER ── */
    .cse-wrap {
      /* Force the CSE to use our background */
    }

    /* ── ALL CSE OVERRIDES ── */

    /* Nuke the outer container */
    .gsc-control-cse {
      background: transparent !important;
      border: none !important;
      padding: 0 !important;
      font-family: 'DM Sans', sans-serif !important;
    }

    /* Hide the CSE's own search box — we have our own */
    .gsc-search-box,
    .gsc-search-box-tools,
    .gsc-above-wrapper-area,
    .gsc-refinementsArea,
    .gcsc-find-more-on-google,
    .gcsc-find-more-on-google-root,
    .gsc-tabsArea,
    .gsc-tabHeader,
    .gs-spelling,
    .gsc-adBlock,
    .gsc-result-info-container > .gsc-cursor-box {
      display: none !important;
    }

    /* Results wrapper */
    .gsc-results-wrapper-nooverlay,
    .gsc-results-wrapper-overlay {
      background: transparent !important;
      border: none !important;
      padding: 0 !important;
    }

    /* Each result */
    .gsc-webResult.gsc-result {
      background: transparent !important;
      border: none !important;
      border-bottom: 1px solid var(--border) !important;
      padding: 20px 0 !important;
      margin: 0 !important;
    }

    .gsc-webResult.gsc-result:last-child {
      border-bottom: none !important;
    }

    /* URL breadcrumb */
    .gs-visibleUrl, .gs-visibleUrl-breadcrumb {
      color: var(--muted2) !important;
      font-size: 0.72rem !important;
      font-family: 'DM Sans', sans-serif !important;
    }

    /* Title */
    .gs-title, .gs-title * {
      font-family: 'Syne', sans-serif !important;
      font-weight: 700 !important;
      font-size: 1.05rem !important;
      color: var(--accent2) !important;
      text-decoration: none !important;
    }

    .gs-title:hover, .gs-title *:hover {
      color: #fff !important;
      text-decoration: none !important;
    }

    /* Snippet */
    .gs-snippet {
      color: var(--muted2) !important;
      font-size: 0.875rem !important;
      font-family: 'DM Sans', sans-serif !important;
      font-weight: 300 !important;
      line-height: 1.6 !important;
    }

    .gs-snippet b {
      color: var(--text) !important;
      font-weight: 400 !important;
    }

    /* Thumbnail if present */
    .gsc-thumbnail-inside, .gsc-url-top {
      padding: 0 !important;
    }

    /* Result info (count) */
    .gsc-result-info {
      color: var(--muted) !important;
      font-size: 0.75rem !important;
      font-family: 'DM Sans', sans-serif !important;
      letter-spacing: 0.06em !important;
      text-transform: uppercase !important;
      padding: 0 0 16px 0 !important;
    }

    /* Pagination */
    .gsc-cursor-box {
      text-align: center !important;
      margin-top: 32px !important;
      padding: 0 !important;
    }

    .gsc-cursor-page {
      background: var(--surface) !important;
      border: 1px solid var(--border) !important;
      color: var(--muted2) !important;
      font-family: 'Syne', sans-serif !important;
      font-size: 0.8rem !important;
      border-radius: 8px !important;
      padding: 6px 13px !important;
      margin: 3px !important;
      display: inline-block !important;
      cursor: pointer !important;
      transition: all 0.15s !important;
      text-decoration: none !important;
    }

    .gsc-cursor-current-page {
      background: var(--accent) !important;
      border-color: var(--accent) !important;
      color: #0d0d0f !important;
      font-weight: 700 !important;
    }

    /* No results */
    .gs-no-results-result .gs-snippet {
      color: var(--muted) !important;
      background: var(--surface) !important;
      border: 1px solid var(--border) !important;
      border-radius: 10px !important;
      padding: 24px !important;
      font-size: 0.9rem !important;
    }

    /* Loading */
    .gsc-loading-fade {
      background: transparent !important;
    }

    footer {
      margin-top: 48px;
      font-size: 0.72rem;
      color: var(--muted);
      letter-spacing: 0.06em;
      text-align: center;
    }

    footer a { color: var(--muted); text-decoration: none; transition: color 0.2s; }
    footer a:hover { color: var(--accent); }
  </style>
</head>
<body>
  <div class="page">
    <div class="header">
      <a href="index.html" class="logo">b<span>.</span>s</a>
      <div class="search-wrap">
        <form action="results.html" method="get">
          <div class="search-row">
            <div class="search-icon">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
              </svg>
            </div>
            <input type="text" id="q" name="q" placeholder="Search…" autocomplete="off">
            <button type="submit" class="search-btn">SEARCH</button>
          </div>
        </form>
      </div>
    </div>

    <div class="cse-wrap">
      <div class="gcse-searchresults-only"></div>
    </div>

    <footer>
      <a href="https://nic.baloony.xyz">bal-nic</a> &nbsp;·&nbsp; powered by Google
    </footer>
  </div>

  <script>
    // Pre-fill the search box from URL param
    const q = new URLSearchParams(location.search).get('q');
    if (q) document.getElementById('q').value = q;

    // When our form submits, also update the CSE query
    document.querySelector('form').addEventListener('submit', function(e) {
      e.preventDefault();
      const val = document.getElementById('q').value.trim();
      if (!val) return;
      window.location.href = 'results.html?q=' + encodeURIComponent(val);
    });
  </script>
</body>
</html>
